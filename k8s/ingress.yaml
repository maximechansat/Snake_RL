apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: snake-rl
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: snake-rl-maximechansat.lab.sspcloud.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: snake-rl
                port:
                  number: 8501
